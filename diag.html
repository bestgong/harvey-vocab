<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>诊断</title>
<style>
  body { font-family: sans-serif; padding: 12px; font-size: 15px; line-height: 1.6; color: #222; background:#fff; }
  .item { padding: 6px 10px; margin: 4px 0; border-radius: 6px; }
  .ok { background: #d6f5d6; }
  .no { background: #ffd6d6; }
  h2 { font-size: 17px; }
  code { word-break: break-all; font-size: 13px; }
  /* 测试卡片：故意用和正式页一样的写法 */
  .testcard { background:#fff; border:2px solid #ccc; border-radius:10px; padding:16px; margin-top:12px; display:block; box-sizing:border-box; text-align:center; }
  .testcard > * { display:block; margin:0 0 8px 0; }
  .tw { font-weight:800; font-size:18px; }
</style>
</head>
<body>
<h2>浏览器与 CSS 支持诊断</h2>
<div class="item"><b>UserAgent:</b><br/><code id="ua"></code></div>
<div id="results"></div>

<h2>测试卡片（应竖排居中、内容在框内）</h2>
<div class="testcard">
  <span class="tw">letter</span>
  <span>n.</span>
  <span>信，信函</span>
  <span>Big Pig On A Dig</span>
</div>

<h2>在线数据连通性测试</h2>
<div class="item" id="netGoogle">Google 表格：测试中…</div>
<div class="item" id="netYoudao">有道发音：测试中…</div>

<script>
  document.getElementById('ua').textContent = navigator.userAgent;
  var tests = [
    ['CSS 变量 var()', window.CSS && CSS.supports && CSS.supports('color','var(--x)')],
    ['Flexbox', window.CSS && CSS.supports && CSS.supports('display','flex')],
    ['CSS Grid', window.CSS && CSS.supports && CSS.supports('display','grid')],
    ['flex gap', window.CSS && CSS.supports && CSS.supports('gap','1rem')],
    ['clamp()', window.CSS && CSS.supports && CSS.supports('width','clamp(1px,2px,3px)')],
    ['@supports 本身', !!(window.CSS && CSS.supports)],
    ['fetch()', typeof fetch === 'function'],
    ['Promise', typeof Promise === 'function'],
    ['speechSynthesis', 'speechSynthesis' in window]
  ];
  var html = '';
  tests.forEach(function(t){
    html += '<div class="item '+(t[1]?'ok':'no')+'">'+(t[1]?'✅ 支持':'❌ 不支持')+'：'+t[0]+'</div>';
  });
  document.getElementById('results').innerHTML = html;

  // 网络测试
  function testNet(url, elId, name){
    var el = document.getElementById(elId);
    try {
      fetch(url, {cache:'no-store'}).then(function(r){
        el.className = 'item ok'; el.textContent = name+'：✅ 可连通 (HTTP '+r.status+')';
      }).catch(function(e){
        el.className = 'item no'; el.textContent = name+'：❌ 连不上 ('+e+')';
      });
      setTimeout(function(){
        if(/测试中/.test(el.textContent)){ el.className='item no'; el.textContent=name+'：❌ 超时（>8秒无响应）'; }
      }, 8000);
    } catch(e){ el.className='item no'; el.textContent=name+'：❌ 出错 '+e; }
  }
  testNet('https://docs.google.com/spreadsheets/d/14SHVvp1axGL9hThYTKc2Q78sL5C0pCNIad-16ZZsth0/gviz/tq?tqx=out:csv&gid=0','netGoogle','Google 表格');
  testNet('https://dict.youdao.com/dictvoice?audio=test&type=2','netYoudao','有道发音');
</script>
</body>
</html>
