<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey 单词乐园 · 复习与测试</title>
  <meta name="description" content="基于 Harvey's Vocabulary Book 的儿童英语单词复习与测试工具：单词卡浏览、选择题、例句填空、单词拼写、错题本。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23ff7a59'/%3E%3Ctext x='16' y='23' font-size='20' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'%3EH%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css?v=10" />
</head>
<body>
  <div class="app">
    <!-- Topbar -->
    <header class="topbar">
      <div class="logo">
        <svg class="logo-mark" viewBox="0 0 48 48" fill="none" aria-hidden="true">
          <rect x="3" y="6" width="42" height="36" rx="10" fill="var(--primary)"/>
          <rect x="3" y="6" width="42" height="36" rx="10" fill="url(#g)" opacity="0.15"/>
          <path d="M24 12c-5 0-9 1.6-9 1.6v22S19 34 24 34s9 1.6 9 1.6v-22S29 12 24 12z" fill="#fff" opacity="0.95"/>
          <path d="M24 12v22" stroke="var(--primary)" stroke-width="2"/>
          <circle cx="24" cy="9" r="3" fill="var(--sun)"/>
          <defs><linearGradient id="g" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#fff"/><stop offset="1" stop-color="#000"/></linearGradient></defs>
        </svg>
        <div>
          <div class="logo-title">Harvey 单词乐园</div>
          <div class="logo-sub">复习 · 测试 · 闯关</div>
        </div>
      </div>
      <div class="topbar-spacer"></div>
      <span class="data-pill" id="dataPill" title="数据来源">
        <span class="data-dot" id="dataDot"></span>
        <span id="dataLabel">加载中…</span>
      </span>
      <button class="icon-btn" id="refreshBtn" aria-label="刷新数据" title="重新读取在线表格">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      </button>
      <button class="icon-btn" data-theme-toggle aria-label="切换深色模式"></button>
    </header>

    <!-- Tabs -->
    <nav class="tabs" role="tablist">
      <button class="tab active" data-view="browse" role="tab">📚 单词本</button>
      <button class="tab" data-view="quiz" role="tab">🎯 开始测试</button>
      <button class="tab" data-view="mistakes" role="tab">📕 错题本 <span id="mistakeCount"></span></button>
    </nav>

    <!-- ===== BROWSE VIEW ===== -->
    <section id="view-browse">
      <div class="stats">
        <div class="stat c1"><div class="stat-num" id="statTotal">0</div><div class="stat-label">总单词</div></div>
        <div class="stat c2"><div class="stat-num" id="statBooks">0</div><div class="stat-label">来源课本</div></div>
        <div class="stat c3"><div class="stat-num" id="statMastered">0</div><div class="stat-label">已掌握</div></div>
        <div class="stat c4"><div class="stat-num" id="statShown">0</div><div class="stat-label">当前筛选</div></div>
      </div>

      <div class="filters">
        <input class="search-input" id="search" type="search" placeholder="🔍 搜索单词或释义…" aria-label="搜索" />
        <div class="field"><label for="fBook">来源课本</label>
          <select id="fBook"><option value="">全部课本</option></select></div>
        <div class="field"><label for="fPos">词性</label>
          <select id="fPos"><option value="">全部词性</option></select></div>
        <div class="field"><label for="fMastery">掌握状态</label>
          <select id="fMastery"><option value="">全部</option><option value="mastered">✅ 已掌握</option><option value="unmastered">⭕ 未掌握</option></select></div>
        <div class="field"><label for="fSort">排序</label>
          <select id="fSort"><option value="id">默认顺序</option><option value="az">字母 A→Z</option><option value="za">字母 Z→A</option></select></div>
      </div>

      <div id="grid" class="grid"></div>
      <div id="browseEmpty" class="empty hidden"><div class="emoji">🔍</div><p>没有匹配的单词，换个筛选试试吧！</p></div>
      <div id="loading" class="center"><div class="spinner"></div><p class="muted">正在加载单词…</p></div>
    </section>

    <!-- ===== QUIZ VIEW ===== -->
    <section id="view-quiz" class="hidden">
      <!-- setup -->
      <div id="quizSetup" class="panel">
        <h2 class="section-title">🎯 选择测试模式</h2>
        <div class="mode-grid" id="modeGrid">
          <button class="mode-card sel" data-mode="zh2en"><div class="mode-emoji">🇨🇳→🇬🇧</div><div class="mode-name">中译英</div><div class="mode-desc">看中文选英文单词</div></button>
          <button class="mode-card" data-mode="en2zh"><div class="mode-emoji">🇬🇧→🇨🇳</div><div class="mode-name">英译中</div><div class="mode-desc">看英文选中文释义</div></button>
          <button class="mode-card" data-mode="cloze"><div class="mode-emoji">✏️</div><div class="mode-name">例句填空</div><div class="mode-desc">在句子里填正确单词</div></button>
          <button class="mode-card" data-mode="spell"><div class="mode-emoji">⌨️</div><div class="mode-name">单词拼写</div><div class="mode-desc">看中文拼出英文单词</div></button>
        </div>

        <div class="filters">
          <div class="field"><label for="qBook">范围 · 课本</label>
            <select id="qBook"><option value="">全部课本</option></select></div>
          <div class="field"><label for="qPool">题库</label>
            <select id="qPool"><option value="all">全部单词</option><option value="unmastered">仅未掌握</option><option value="mistakes">仅错题本</option></select></div>
          <div class="field"><label for="qCount">题目数量</label>
            <select id="qCount"><option value="10">10 题</option><option value="20" selected>20 题</option><option value="30">30 题</option><option value="0">全部</option></select></div>
        </div>
        <p class="muted mt4" id="quizPoolInfo"></p>
        <button class="btn btn-primary btn-block gap" id="startQuiz">🚀 开始测试</button>
      </div>

      <!-- play -->
      <div id="quizPlay" class="panel hidden">
        <div class="quiz-head">
          <span class="score-chip" id="qIndex">1 / 20</span>
          <div class="progress-bar"><div class="progress-fill" id="qProgress" style="width:0%"></div></div>
          <span class="score-chip" style="color:var(--leaf)">⭐ <span id="qScore">0</span></span>
        </div>
        <div id="qBody"></div>
        <div class="feedback" id="qFeedback"></div>
        <button class="btn btn-ghost btn-block hidden" id="qNext">下一题 →</button>
      </div>

      <!-- result -->
      <div id="quizResult" class="panel result hidden">
        <div class="emoji" id="rEmoji">🎉</div>
        <div class="big" id="rTitle">太棒了！</div>
        <div class="ring" id="rRing"><div class="ring-inner" id="rPct">0%</div></div>
        <p class="muted" id="rDetail"></p>
        <div class="row-between gap" style="justify-content:center">
          <button class="btn btn-primary" id="rAgain">🔁 再来一组</button>
          <button class="btn btn-ghost" id="rReview">📕 查看错题</button>
        </div>
      </div>
    </section>

    <!-- ===== MISTAKES VIEW ===== -->
    <section id="view-mistakes" class="hidden">
      <div class="row-between" style="margin-bottom:var(--space-5)">
        <h2 class="section-title" style="margin:0">📕 错题本</h2>
        <button class="btn btn-ghost" id="clearMistakes">🧹 清空错题本</button>
      </div>
      <div id="mistakeList"></div>
      <div id="mistakeEmpty" class="empty hidden"><div class="emoji">🌟</div><p>太厉害了，错题本是空的！</p></div>
    </section>
  </div>

  <!-- Word detail modal -->
  <div class="overlay" id="overlay">
    <div class="modal" role="dialog" aria-modal="true">
      <button class="icon-btn modal-close" id="modalClose" aria-label="关闭">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
      <div id="modalBody"></div>
    </div>
  </div>

  <footer class="center muted" style="padding:var(--space-8) 0; font-size:var(--text-xs)">
    数据来源：Harvey's Vocabulary Book · 单词进度保存在本机浏览器
  </footer>

  <script src="data.js?v=10"></script>
  <script src="app.js?v=10"></script>
</body>
</html>
